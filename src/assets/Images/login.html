<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Login</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    background: radial-gradient(ellipse at top, #0d2050 0%, #0a1628 60%, #060e1e 100%);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Segoe UI', sans-serif;
  }
  .container {
    width: 300px;
    display: flex; flex-direction: column; align-items: center;
    padding: 2rem 1.5rem;
  }
  .mascote img {
    width: 130px; height: 130px;
    object-fit: contain;
    filter: drop-shadow(0 0 18px rgba(0,180,255,0.35));
  }
  .logo img {
    width: 80px; height: 80px;
    object-fit: contain;
    margin: 8px 0 4px;
    filter: drop-shadow(0 0 10px rgba(0,140,255,0.3));
  }
  .tagline {
    color: #6a9fd8; font-size: 12px;
    text-align: center; margin-bottom: 28px; letter-spacing: 0.3px;
  }
  .field {
    width: 100%;
    background: #0d1f3c;
    border: 1px solid #1e3a6e;
    border-radius: 8px;
    display: flex; align-items: center;
    gap: 10px; padding: 0 14px; height: 48px;
    margin-bottom: 12px;
  }
  .field svg { flex-shrink: 0; }
  .field input {
    background: transparent; border: none; outline: none;
    color: #8ab0e0; font-size: 14px; flex: 1;
    font-family: inherit;
  }
  .field input::placeholder { color: #4a6a9a; }
  .btn-entrar {
    width: 100%;
    background: linear-gradient(90deg, #1a6be0, #2a9eff);
    border: none; border-radius: 8px; height: 48px;
    color: #fff; font-size: 15px; font-weight: 600;
    cursor: pointer; letter-spacing: 0.3px; margin-top: 4px;
    transition: opacity 0.2s;
  }
  .btn-entrar:hover { opacity: 0.88; }
  .forgot { color: #4a7de0; font-size: 12px; margin-top: 16px; text-decoration: none; }
  .forgot:hover { text-decoration: underline; }
</style>
</head>
